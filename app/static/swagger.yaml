swagger: '2.0'
info:
  title: NAPS API
  description: API for managing users, authentication, and admin tasks.
  version: 1.0.0
basePath: /api
schemes:
  - http
  - https
consumes:
  - application/json
produces:
  - application/json
securityDefinitions:
  ApiKeyAuth:
    type: apiKey
    in: header
    name: x-api-key
    description: API key for authentication
  BearerAuth:
    type: apiKey
    in: header
    name: Authorization
    description: JWT token for authentication format -> Bearer <token>
paths:
  /users:
    get:
      tags:
        - Users
      summary: List all users
      description: Retrieve a paginated list of all users.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          type: integer
          required: false
          default: 1
          description: Page number
        - name: per_page
          in: query
          type: integer
          required: false
          default: 10
          description: Number of items per page
      responses:
        200:
          description: A list of users
          schema:
            type: object
            properties:
              users:
                type: array
                items:
                  $ref: '#/definitions/User'
              total:
                type: integer
              pages:
                type: integer
              current_page:
                type: integer
    post:
      tags:
        - Users
      summary: Create a new user
      description: Create a new user account.
      security:
        - ApiKeyAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: firstname
          in: formData
          type: string
          required: true
        - name: lastname
          in: formData
          type: string
          required: true
        - name: email
          in: formData
          type: string
          required: true
        - name: current_level
          in: formData
          type: string
          required: true
        - name: matric_no
          in: formData
          type: string
          required: true
        - name: password
          in: formData
          type: string
          required: true
        - name: departmental_fees
          in: formData
          type: file
          required: false
        - name: profile_picture
          in: formData
          type: file
          required: false
      responses:
        201:
          description: User created successfully
          schema:
            $ref: '#/definitions/User'
        400:
          description: Invalid input
        409:
          description: Email or matric number already exists
  /users/{user_id}:
      get:
        tags:
          - Users
        summary: Get a user by ID
        description: Retrieve a user by their ID.
        security:
          - ApiKeyAuth: []
          - BearerAuth: []
        parameters:
          - name: user_id
            in: path
            type: integer
            required: true
            description: ID of the user to retrieve
        responses:
          200:
            description: User found
            schema:
              $ref: '#/definitions/User'
          404:
            description: Application not found
  /users/confirm:
    post:
      tags:
        - Users
      summary: Confirm user email
      description: Confirm user email with OTP.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/ConfirmEmail'
      responses:
        200:
          description: Email confirmed successfully
        400:
          description: Invalid input
  /users/resend-otp:
    post:
      tags:
        - Users
      summary: Resend verification OTP
      description: Resend verification OTP to the user's email.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/ResendOTP'
      responses:
        200:
          description: OTP resent successfully
        400:
          description: Invalid input
  /users/login:
    post:
      tags:
        - Users
      summary: User login
      description: User login with email and password.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/Login'
      responses:
        200:
          description: Login successful
          schema:
            type: object
            properties:
              access_token:
                type: string
              user:
                $ref: '#/definitions/UserWithMentor'
        401:
          description: Invalid credentials
        403:
          description: Email not confirmed
  /users/login/matric:
    post:
      tags:
        - Users
      summary: User login with matric number
      description: User login with matric number and password.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/LoginMatric'
      responses:
        200:
          description: Login successful
          schema:
            type: object
            properties:
              access_token:
                type: string
              user:
                $ref: '#/definitions/UserWithMentor'
        401:
          description: Invalid credentials
  /users/forgot-password:
    post:
      tags:
        - Users
      summary: Forgot password
      description: Initiate password reset process.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/ForgotPassword'
      responses:
        200:
          description: Password reset initiated
        400:
          description: Invalid input
  /users/reset-password:
    post:
      tags:
        - Users
      summary: Reset password
      description: Reset password with OTP.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/ResetPassword'
      responses:
        200:
          description: Password reset successful
        400:
          description: Invalid input
  /users/update/{user_id}:
    put:
      tags:
        - Users
      summary: Update an existing user
      description: Update an existing user's information.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: ID of the user to update
        - name: current_level
          in: formData
          type: string
          required: false
        - name: bio
          in: formData
          type: string
          required: false
        - name: profile_picture
          in: formData
          type: file
          required: false
      responses:
        200:
          description: User updated successfully
        403:
          description: Permission denied
  /users/delete/{user_id}:
    delete:
      tags:
        - Users
      summary: Delete a user
      description: Delete an existing user.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: ID of the user to delete
      responses:
        200:
          description: User deleted successfully
        403:
          description: Permission denied
  /resources:
    post:
      tags:
        - Resources
      summary: Upload a new resource
      description: Upload a new resource file.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: file
          in: formData
          type: file
          required: true
          description: The resource file to upload.
        - name: title
          in: formData
          type: string
          required: true
          description: Title of the resource.
        - name: author
          in: formData
          type: string
          required: true
          description: Author of the resource.
        - name: course_title
          in: formData
          type: string
          required: true
          description: Title of the course the resource belongs to.
        - name: level
          in: formData
          type: string
          required: true
          description: Academic level of the resource.
        - name: contributors
          in: formData
          type: array
          items:
            type: string
          required: false
          description: List of contributors (optional).
      responses:
        201:
          description: Resource uploaded successfully
          schema:
            $ref: '#/definitions/Resource'
        400:
          description: Invalid input or missing fields
        500:
          description: Internal server error
  /resources/level/{level}:
    get:
      tags:
        - Resources
      summary: Get resources by level
      description: Retrieve all approved resources for a specific academic level.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: level
          in: path
          type: string
          required: true
          description: Academic level to filter resources by.
      responses:
        200:
          description: List of resources for the specified level
          schema:
            type: array
            items:
              $ref: '#/definitions/Resource'
        500:
          description: Internal server error
  /resources/pending:
    get:
      tags:
        - Resources
      summary: Get pending resources
      description: Retrieve all resources pending approval (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        200:
          description: List of pending resources
          schema:
            type: array
            items:
              $ref: '#/definitions/Resource'
        403:
          description: Permission denied (non-admin access)
        500:
          description: Internal server error
  /resources/{resource_id}/approve:
    post:
      tags:
        - Resources
      summary: Approve a resource
      description: Approve a pending resource (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: resource_id
          in: path
          type: integer
          required: true
          description: ID of the resource to approve.
      responses:
        200:
          description: Resource approved successfully
          schema:
            $ref: '#/definitions/Resource'
        400:
          description: Invalid resource ID or already approved
        403:
          description: Permission denied (non-admin access)
        500:
          description: Internal server error
  /resources/{resource_id}:
    delete:
      tags:
        - Resources
      summary: Delete a resource
      description: Delete a resource and its associated file (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: resource_id
          in: path
          type: integer
          required: true
          description: ID of the resource to delete.
      responses:
        200:
          description: Resource deleted successfully
        400:
          description: Invalid resource ID
        403:
          description: Permission denied (non-admin access)
        500:
          description: Internal server error
  /forums:
    get:
      tags:
        - Forums
      summary: Get all forums
      description: Retrieve a list of all forums.
      security:
        - ApiKeyAuth: []
      responses:
        200:
          description: List of forums
          schema:
            type: array
            items:
              $ref: '#/definitions/Forum'
    post:
      tags:
        - Forums
      summary: Create a new forum
      description: Create a new forum (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/NewForum'
      responses:
        201:
          description: Forum created successfully
          schema:
            $ref: '#/definitions/Forum'
        400:
          description: Missing required fields
        403:
          description: Unauthorized (non-admin access)
  /forums/{forum_id}/join:
    post:
      tags:
        - Forums
      summary: Join a forum
      description: Join a specific forum.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: forum_id
          in: path
          type: integer
          required: true
          description: ID of the forum to join.
      responses:
        200:
          description: Successfully joined the forum
        400:
          description: Unable to join the forum
  /forums/{forum_id}/threads:
    post:
      tags:
        - Forums
      summary: Create a new thread
      description: Create a new thread in a forum.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: forum_id
          in: path
          type: integer
          required: true
          description: ID of the forum to create the thread in.
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/NewThread'
      responses:
        201:
          description: Thread created successfully
          schema:
            $ref: '#/definitions/Thread'
        400:
          description: Missing required fields
  /forums/threads/{thread_id}:
    get:
      tags:
        - Forums
      summary: Get thread details
      description: Get a specific thread and its messages.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: thread_id
          in: path
          type: integer
          required: true
          description: ID of the thread to retrieve.
      responses:
        200:
          description: Thread details with messages
          schema:
            type: object
            properties:
              thread:
                $ref: '#/definitions/Thread'
              messages:
                type: array
                items:
                  $ref: '#/definitions/Message'
        404:
          description: Thread not found
  /forums/threads/{thread_id}/messages:
    post:
      tags:
        - Forums
      summary: Send a message in a thread
      description: Send a message in a specific thread.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: thread_id
          in: path
          type: integer
          required: true
          description: ID of the thread to send the message in.
        - name: content
          in: formData
          type: string
          required: true
        - name: parent_message_id
          in: formData
          type: integer
          required: false
        - name: attachment
          in: formData
          type: file
          required: false
      responses:
        200:
          description: Message sent successfully
          schema:
            $ref: '#/definitions/Message'
        400:
          description: Missing required fields
    get:
      tags:
        - Forums
      summary: Get thread messages
      description: Retrieve all messages in a specific thread.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: thread_id
          in: path
          type: integer
          required: true
          description: ID of the thread to retrieve messages from.
      responses:
        200:
          description: List of messages in the thread
          schema:
            type: array
            items:
              $ref: '#/definitions/Message'
  /forums/explore:
    get:
      tags:
        - Forums
      summary: Explore all forums
      description: Explore all available forums.
      security:
        - ApiKeyAuth: []
      responses:
        200:
          description: List of all forums
          schema:
            type: array
            items:
              $ref: '#/definitions/Forum'
  /forums/recommended:
    get:
      tags:
        - Forums
      summary: Get recommended forums
      description: Get a list of recommended forums.
      security:
        - ApiKeyAuth: []
      responses:
        200:
          description: List of recommended forums
          schema:
            type: array
            items:
              $ref: '#/definitions/Forum'
  /forums/top-contributors:
    get:
      tags:
        - Forums
      summary: Get top contributors
      description: Get a list of top contributors.
      security:
        - ApiKeyAuth: []
      responses:
        200:
          description: List of top contributors
          schema:
            type: array
            items:
              $ref: '#/definitions/TopContributor'
  /forums/messages/{message_id}/like:
    post:
      tags:
        - Forums
      summary: Like a message
      description: Like a specific message in a thread.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: message_id
          in: path
          type: integer
          required: true
          description: ID of the message to like.
      responses:
        200:
          description: Message liked successfully
          schema:
            $ref: '#/definitions/Message'
        404:
          description: Message not found
  /events:
    get:
      tags:
        - Events
      summary: Get all events
      description: Retrieve a list of all approved events.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        200:
          description: List of events
          schema:
            type: array
            items:
              $ref: '#/definitions/Event'
        500:
          description: Internal server error
    post:
      tags:
        - Events
      summary: Create a new event
      description: Create a new event.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/NewEvent'
      responses:
        201:
          description: Event created successfully
          schema:
            $ref: '#/definitions/Event'
        400:
          description: Invalid input data
        500:
          description: Internal server error
  /events/{event_id}:
    get:
      tags:
        - Events
      summary: Get event details
      description: Retrieve details of a specific event.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: event_id
          in: path
          type: integer
          required: true
          description: ID of the event to retrieve.
      responses:
        200:
          description: Event details
          schema:
            $ref: '#/definitions/Event'
        404:
          description: Event not found
  /events/{event_id}/rsvp:
    post:
      tags:
        - Events
      summary: RSVP to an event
      description: RSVP to a specific event.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: event_id
          in: path
          type: integer
          required: true
          description: ID of the event to RSVP to.
      responses:
        200:
          description: RSVP successful
        400:
          description: Unable to RSVP
  /events/{event_id}/cancel_rsvp:
    post:
      tags:
        - Events
      summary: Cancel RSVP
      description: Cancel an RSVP for a specific event.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: event_id
          in: path
          type: integer
          required: true
          description: ID of the event to cancel RSVP for.
      responses:
        200:
          description: RSVP cancelled successfully
        400:
          description: Unable to cancel RSVP
  /events/type/{event_type}:
    get:
      tags:
        - Events
      summary: Get events by type
      description: Retrieve events filtered by type.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: event_type
          in: path
          type: string
          required: true
          description: Type of events to retrieve.
      responses:
        200:
          description: List of events filtered by type
          schema:
            type: array
            items:
              $ref: '#/definitions/Event'
        500:
          description: Internal server error
  /feedback:
    post:
      tags:
        - Feedback
      summary: Submit feedback
      description: Submit new feedback.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/NewFeedback'
      responses:
        201:
          description: Feedback submitted successfully
          schema:
            $ref: '#/definitions/Feedback'
        400:
          description: Missing required fields
  /admins/login:
      post:
        tags:
          - Admin
        summary: Admin login
        description: Authenticate an admin user and return an access token.
        security:
          - ApiKeyAuth: []
        parameters:
          - name: body
            in: body
            required: true
            schema:
              $ref: '#/definitions/AdminLogin'
        responses:
          200:
            description: Login successful
            schema:
              type: object
              properties:
                access_token:
                  type: string
          401:
            description: Invalid credentials
  /admins/super-admin:
    post:
      tags:
        - Admin
      summary: Create super admin
      description: Create a new super admin user (super admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/NewAdmin'
      responses:
        201:
          description: Super admin created successfully
        400:
          description: Invalid input or user already exists
  /admins/admin:
    post:
      tags:
        - Admin
      summary: Create admin
      description: Create a new admin user (super admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/NewAdmin'
      responses:
        201:
          description: Admin created successfully
        400:
          description: Invalid input or user already exists
  /admins/users:
    get:
      tags:
        - Admin
      summary: List all users (Admin)
      description: Get a list of all users with optional search (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          type: string
          required: false
          description: Search term for filtering users
      responses:
        200:
          description: List of users
          schema:
            type: array
            items:
              $ref: '#/definitions/User'
  /admins/users/{user_id}:
    get:
      tags:
        - Admin
      summary: Get user profile (Admin)
      description: Get a specific user's profile (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: User profile
          schema:
            $ref: '#/definitions/User'
        404:
          description: User not found
    delete:
      tags:
        - Admin
      summary: Delete user account (Admin)
      description: Permanently delete a user's account (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: User deleted successfully
        403:
          description: User cannot be deleted
        404:
          description: User not found
  /admins/users/{user_id}/deactivate:
    put:
      tags:
        - Admin
      summary: Deactivate user account
      description: Deactivate a user's account (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: User deactivated successfully
        404:
          description: User not found
  /admins/users/{user_id}/reactivate:
    put:
      tags:
        - Admin
      summary: Reactivate user account
      description: Reactivate a user's account (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: User reactivated successfully
        404:
          description: User not found
  /admins/resources:
    get:
      tags:
        - Admin
      summary: List all resources (Admin)
      description: Get a list of all resources, filterable by status (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          type: string
          required: false
          description: Filter by approval status
      responses:
        200:
          description: List of resources
          schema:
            type: array
            items:
              $ref: '#/definitions/Resource'
  /admins/resources/{resource_id}/approve:
    put:
      tags:
        - Admin
      summary: Approve resource (Admin)
      description: Approve a pending resource (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: resource_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Resource approved successfully
        400:
          description: Invalid resource
  /admins/resources/{resource_id}/reject:
    put:
      tags:
        - Admin
      summary: Reject resource (Admin)
      description: Reject a pending resource (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: resource_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Resource rejected successfully
        400:
          description: Invalid resource
  /admins/events:
    get:
      tags:
        - Admin
      summary: List all events (Admin)
      description: Get a list of all events, filterable by approval status (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          type: string
          required: false
          description: Filter by approval status (approved/pending)
      responses:
        200:
          description: List of events
          schema:
            type: array
            items:
              $ref: '#/definitions/Event'
  /admins/events/{event_id}/approve:
    put:
      tags:
        - Admin
      summary: Approve event (Admin)
      description: Approve a pending event (admin only).
      security:
