swagger: '2.0'
info:
  title: NAPS API
  description: API for managing users, authentication, and admin tasks.
  version: 1.0.0
basePath: /api
schemes:
  - http
  - https
consumes:
  - application/json
produces:
  - application/json
securityDefinitions:
  ApiKeyAuth:
    type: apiKey
    in: header
    name: x-api-key
    description: API key for authentication
  BearerAuth:
    type: apiKey
    in: header
    name: Authorization
    description: JWT token for authentication format -> Bearer <token>
paths:
  /users:
    get:
      tags:
        - Users
      summary: List all users
      description: Retrieve a paginated list of all users.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          type: integer
          required: false
          default: 1
          description: Page number
        - name: per_page
          in: query
          type: integer
          required: false
          default: 10
          description: Number of items per page
      responses:
        200:
          description: A list of users
          schema:
            type: object
            properties:
              users:
                type: array
                items:
                  $ref: '#/definitions/User'
              total:
                type: integer
              pages:
                type: integer
              current_page:
                type: integer
    post:
      tags:
        - Users
      summary: Create a new user
      description: Create a new user account.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/NewUser'
      responses:
        201:
          description: User created successfully
          schema:
            $ref: '#/definitions/User'
        400:
          description: Invalid input
  /users/{user_id}:
    get:
      tags:
        - Users
      summary: Get a user by ID
      description: Retrieve a user by their ID.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: ID of the user to retrieve
      responses:
        200:
          description: User found
          schema:
            $ref: '#/definitions/User'
        404:
          description: User not found
  /users/confirm:
    post:
      tags:
        - Users
      summary: Confirm user email
      description: Confirm user email with OTP.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/ConfirmEmail'
      responses:
        200:
          description: Email confirmed successfully
        400:
          description: Invalid input
  /users/resend-otp:
    post:
      tags:
        - Users
      summary: Resend verification OTP
      description: Resend verification OTP to the user's email.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/ResendOTP'
      responses:
        200:
          description: OTP resent successfully
        400:
          description: Invalid input
  /users/login:
    post:
      tags:
        - Users
      summary: User login
      description: User login with email and password.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/Login'
      responses:
        200:
          description: Login successful
          schema:
            type: object
            properties:
              access_token:
                type: string
        401:
          description: Invalid credentials
  /users/login/matric:
    post:
      tags:
        - Users
      summary: User login with matric number
      description: User login with matric number and password.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/LoginMatric'
      responses:
        200:
          description: Login successful
          schema:
            type: object
            properties:
              access_token:
                type: string
        401:
          description: Invalid credentials
  /users/forgot-password:
    post:
      tags:
        - Users
      summary: Forgot password
      description: Initiate password reset process.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/ForgotPassword'
      responses:
        200:
          description: Password reset initiated
        400:
          description: Invalid input
  /users/reset-password:
    post:
      tags:
        - Users
      summary: Reset password
      description: Reset password with OTP.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/ResetPassword'
      responses:
        200:
          description: Password reset successful
        400:
          description: Invalid input
  /users/update/{user_id}:
    put:
      tags:
        - Users
      summary: Update an existing user
      description: Update an existing user's information.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: ID of the user to update
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/UpdateUser'
      responses:
        200:
          description: User updated successfully
        403:
          description: Permission denied
  /users/delete/{user_id}:
    delete:
      tags:
        - Users
      summary: Delete a user
      description: Delete an existing user.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: ID of the user to delete
      responses:
        200:
          description: User deleted successfully
        403:
          description: Permission denied
  /resources:
    post:
      tags:
        - Resources
      summary: Upload a new resource
      description: Upload a new resource file.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: file
          in: formData
          type: file
          required: true
          description: The resource file to upload.
        - name: title
          in: formData
          type: string
          required: true
          description: Title of the resource.
        - name: author
          in: formData
          type: string
          required: true
          description: Author of the resource.
        - name: course_title
          in: formData
          type: string
          required: true
          description: Title of the course the resource belongs to.
        - name: level
          in: formData
          type: string
          required: true
          description: Academic level of the resource.
        - name: contributors
          in: formData
          type: array
          items:
            type: string
          required: false
          description: List of contributors (optional).
      responses:
        201:
          description: Resource uploaded successfully
          schema:
            $ref: '#/definitions/Resource'
        400:
          description: Invalid input or missing fields
        500:
          description: Internal server error
  /resources/level/{level}:
    get:
      tags:
        - Resources
      summary: Get resources by level
      description: Retrieve all approved resources for a specific academic level.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: level
          in: path
          type: string
          required: true
          description: Academic level to filter resources by.
      responses:
        200:
          description: List of resources for the specified level
          schema:
            type: array
            items:
              $ref: '#/definitions/Resource'
        500:
          description: Internal server error
  /resources/pending:
    get:
      tags:
        - Resources
      summary: Get pending resources
      description: Retrieve all resources pending approval (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        200:
          description: List of pending resources
          schema:
            type: array
            items:
              $ref: '#/definitions/Resource'
        403:
          description: Permission denied (non-admin access)
        500:
          description: Internal server error
  /resources/{resource_id}/approve:
    post:
      tags:
        - Resources
      summary: Approve a resource
      description: Approve a pending resource (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: resource_id
          in: path
          type: integer
          required: true
          description: ID of the resource to approve.
      responses:
        200:
          description: Resource approved successfully
          schema:
            $ref: '#/definitions/Resource'
        400:
          description: Invalid resource ID or already approved
        403:
          description: Permission denied (non-admin access)
        500:
          description: Internal server error
  /resources/{resource_id}:
    delete:
      tags:
        - Resources
      summary: Delete a resource
      description: Delete a resource and its associated file (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: resource_id
          in: path
          type: integer
          required: true
          description: ID of the resource to delete.
      responses:
        200:
          description: Resource deleted successfully
        400:
          description: Invalid resource ID
        403:
          description: Permission denied (non-admin access)
        500:
          description: Internal server error
  /forums:
    get:
      tags:
        - Forums
      summary: Get all forums
      description: Retrieve a list of all forums.
      security:
        - ApiKeyAuth: []
      responses:
        200:
          description: List of forums
          schema:
            type: array
            items:
              $ref: '#/definitions/Forum'
    post:
      tags:
        - Forums
      summary: Create a new forum
      description: Create a new forum (admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/NewForum'
      responses:
        201:
          description: Forum created successfully
          schema:
            $ref: '#/definitions/Forum'
        400:
          description: Missing required fields
        403:
          description: Unauthorized (non-admin access)
  /forums/{forum_id}/join:
    post:
      tags:
        - Forums
      summary: Join a forum
      description: Join a specific forum.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: forum_id
          in: path
          type: integer
          required: true
          description: ID of the forum to join.
      responses:
        200:
          description: Successfully joined the forum
        400:
          description: Unable to join the forum
  /forums/{forum_id}/threads:
    post:
      tags:
        - Forums
      summary: Create a new thread
      description: Create a new thread in a forum.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: forum_id
          in: path
          type: integer
          required: true
          description: ID of the forum to create the thread in.
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/NewThread'
      responses:
        201:
          description: Thread created successfully
          schema:
            $ref: '#/definitions/Thread'
        400:
          description: Missing required fields
  /forums/threads/{thread_id}/messages:
    post:
      tags:
        - Forums
      summary: Send a message in a thread
      description: Send a message in a specific thread.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: thread_id
          in: path
          type: integer
          required: true
          description: ID of the thread to send the message in.
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/NewMessage'
      responses:
        201:
          description: Message sent successfully
          schema:
            $ref: '#/definitions/Message'
        400:
          description: Missing required fields
    get:
      tags:
        - Forums
      summary: Get thread messages
      description: Retrieve all messages in a specific thread.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: thread_id
          in: path
          type: integer
          required: true
          description: ID of the thread to retrieve messages from.
      responses:
        200:
          description: List of messages in the thread
          schema:
            type: array
            items:
              $ref: '#/definitions/Message'
  /forums/messages/{message_id}/like:
    post:
      tags:
        - Forums
      summary: Like a message
      description: Like a specific message in a thread.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: message_id
          in: path
          type: integer
          required: true
          description: ID of the message to like.
      responses:
        200:
          description: Message liked successfully
          schema:
            $ref: '#/definitions/Message'
        404:
          description: Message not found
  /events:
    get:
      tags:
        - Events
      summary: Get all events
      description: Retrieve a list of all approved events.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        200:
          description: List of events
          schema:
            type: array
            items:
              $ref: '#/definitions/Event'
        500:
          description: Internal server error
    post:
      tags:
        - Events
      summary: Create a new event
      description: Create a new event.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/NewEvent'
      responses:
        201:
          description: Event created successfully
          schema:
            $ref: '#/definitions/Event'
        400:
          description: Invalid input data
        500:
          description: Internal server error
  /events/{event_id}:
    get:
      tags:
        - Events
      summary: Get event details
      description: Retrieve details of a specific event.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: event_id
          in: path
          type: integer
          required: true
          description: ID of the event to retrieve.
      responses:
        200:
          description: Event details
          schema:
            $ref: '#/definitions/Event'
        404:
          description: Event not found
  /events/{event_id}/rsvp:
    post:
      tags:
        - Events
      summary: RSVP to an event
      description: RSVP to a specific event.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: event_id
          in: path
          type: integer
          required: true
          description: ID of the event to RSVP to.
      responses:
        200:
          description: RSVP successful
        400:
          description: Unable to RSVP
  /events/{event_id}/cancel_rsvp:
    post:
      tags:
        - Events
      summary: Cancel RSVP
      description: Cancel an RSVP for a specific event.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: event_id
          in: path
          type: integer
          required: true
          description: ID of the event to cancel RSVP for.
      responses:
        200:
          description: RSVP cancelled successfully
        400:
          description: Unable to cancel RSVP
  /events/type/{event_type}:
    get:
      tags:
        - Events
      summary: Get events by type
      description: Retrieve events filtered by type.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: event_type
          in: path
          type: string
          required: true
          description: Type of events to retrieve.
      responses:
        200:
          description: List of events filtered by type
          schema:
            type: array
            items:
              $ref: '#/definitions/Event'
        500:
          description: Internal server error
  /admin/create:
    post:
      tags:
        - Admin
      summary: Create an admin user
      description: Create a new admin user.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/NewAdmin'
      responses:
        201:
          description: Admin user created successfully
          schema:
            $ref: '#/definitions/Admin'
        400:
          description: Invalid input
  /admin/login:
    post:
      tags:
        - Admin
      summary: Admin login
      description: Authenticate an admin user and return an access token.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/AdminLogin'
      responses:
        200:
          description: Login successful
          schema:
            type: object
            properties:
              access_token:
                type: string
        401:
          description: Invalid credentials
  /generate_api_key:
    post:
      tags:
        - Auth
      summary: Generate API key
      description: Generate a new API key (admin only).
      security:
        - BearerAuth: []
      responses:
        201:
          description: API key generated successfully
          schema:
            type: object
            properties:
              message:
                type: string
              api_key:
                type: string
        403:
          description: Permission denied (non-admin access)
  /test_generate_api_key:
    post:
      tags:
        - Auth
      summary: Test generate API key
      description: Generate a new API key for testing purposes (no authentication required).
      responses:
        201:
          description: Test API key generated successfully
          schema:
            type: object
            properties:
              message:
                type: string
              api_key:
                type: string
  /api_keys:
    get:
      tags:
        - Auth
      summary: List all API keys
      description: Retrieve a list of all API keys (admin only).
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of API keys
          schema:
            type: array
            items:
              $ref: '#/definitions/APIKey'
        403:
          description: Permission denied (non-admin access)
  /api_keys/{api_key_id}:
    delete:
      tags:
        - Auth
      summary: Delete an API key
      description: Delete an API key by its ID (admin only).
      security:
        - BearerAuth: []
      parameters:
        - name: api_key_id
          in: path
          type: integer
          required: true
          description: ID of the API key to delete.
      responses:
        200:
          description: API key deleted successfully
        404:
          description: API key not found
        403:
          description: Permission denied (non-admin access)
  /mentorship/apply:
    post:
      tags:
        - Mentorship
      summary: Apply for mentorship
      description: Apply for mentorship as a student.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/MentorshipApplication'
      responses:
        201:
          description: Application submitted successfully
          schema:
            $ref: '#/definitions/MentorshipApplicationResponse'
        400:
          description: Missing required fields
        500:
          description: Internal server error
  /mentorship/apply-mentor:
    post:
      tags:
        - Mentorship
      summary: Apply to be mentor
      description: Apply to become a mentor.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/MentorApplication'
      responses:
        201:
          description: Application submitted successfully
          schema:
            $ref: '#/definitions/MentorApplicationResponse'
        400:
          description: Missing required fields or invalid data
        500:
          description: Internal server error
  /mentorship/applications:
    get:
      tags:
        - Mentorship
      summary: Get pending applications
      description: Get pending mentorship applications (Admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        200:
          description: List of pending applications
          schema:
            type: array
            items:
              $ref: '#/definitions/MentorshipApplicationResponse'
        403:
          description: Unauthorized access
  /mentorship/mentor-applications:
    get:
      tags:
        - Mentorship
      summary: Get pending mentor applications
      description: Get pending mentor applications (Admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        200:
          description: List of pending mentor applications
          schema:
            type: array
            items:
              $ref: '#/definitions/MentorApplicationResponse'
        403:
          description: Unauthorized access
  /mentorship/mentor-applications/{application_id}/approve:
    post:
      tags:
        - Mentorship
      summary: Approve mentor application
      description: Approve a mentor application (Admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Application approved
          schema:
            $ref: '#/definitions/MentorApplicationResponse'
        400:
          description: Invalid application
        403:
          description: Unauthorized access
  /mentorship/mentor-applications/{application_id}/reject:
    post:
      tags:
        - Mentorship
      summary: Reject mentor application
      description: Reject a mentor application (Admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: application_id
          in: path
          type: integer
          required: true
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              reason:
                type: string
      responses:
        200:
          description: Application rejected
          schema:
            $ref: '#/definitions/MentorApplicationResponse'
        400:
          description: Missing reason or invalid application
        403:
          description: Unauthorized access
  /mentorship/assign-mentor:
    post:
      tags:
        - Mentorship
      summary: Assign mentor
      description: Assign a mentor to a student (Admin only).
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/MentorAssignment'
      responses:
        201:
          description: Mentor assigned successfully
          schema:
            $ref: '#/definitions/MentorshipRelationship'
        400:
          description: Missing required fields or invalid data
        403:
          description: Unauthorized access
  /mentorship/schedule-session:
    post:
      tags:
        - Mentorship
      summary: Schedule session
      description: Schedule a mentorship session.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/SessionSchedule'
      responses:
        201:
          description: Session scheduled successfully
          schema:
            $ref: '#/definitions/MentorshipSession'
        400:
          description: Missing required fields or invalid data
  /mentorship/submit-feedback:
    post:
      tags:
        - Mentorship
      summary: Submit feedback
      description: Submit feedback for a session.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/SessionFeedback'
      responses:
        201:
          description: Feedback submitted successfully
          schema:
            $ref: '#/definitions/SessionFeedbackResponse'
        400:
          description: Missing required fields
  /mentorship/my-mentorships:
    get:
      tags:
        - Mentorship
      summary: Get my mentorships
      description: Get user's mentorship relationships.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        200:
          description: User's mentorship relationships
          schema:
            $ref: '#/definitions/UserMentorships'
  /mentorship/mentorships/{mentorship_id}/sessions:
    get:
      tags:
        - Mentorship
      summary: Get mentorship sessions
      description: Get all sessions for a mentorship.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: mentorship_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: List of sessions
          schema:
            type: array
            items:
              $ref: '#/definitions/MentorshipSession'
        403:
          description: Unauthorized access
  /mentorship/mentorships/{mentorship_id}/complete:
    post:
      tags:
        - Mentorship
      summary: Complete mentorship
      description: Mark a mentorship as completed.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: mentorship_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Mentorship completed
          schema:
            $ref: '#/definitions/MentorshipRelationship'
        403:
          description: Unauthorized access
definitions:
  User:
    type: object
    properties:
      id:
        type: integer
      firstname:
        type: string
      lastname:
        type: string
      email:
        type: string
      current_level:
        type: string
